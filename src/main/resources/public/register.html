<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Amber Contacts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.add('light');
    </script>
</head>
<body class="bg-background text-foreground">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create an Account</h1>
                <p>Join the directory to manage your contacts.</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="grid-cols-2">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="firstName" class="form-input" required placeholder="Jane">
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="optional">(Optional)</span></label>
                        <input type="text" name="lastName" class="form-input" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-input" required placeholder="jane.doe@example.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="Min 8 characters">
                </div>
                <div class="auth-submit-wrapper">
                    <button type="submit" class="btn-primary auth-submit">Sign Up</button>
                </div>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Log In</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
