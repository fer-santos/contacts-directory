name: Java CI with GitHub Actions

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download JUnit 5 Console Standalone
      run: |
        wget https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar -O junit-platform-console-standalone.jar

    - name: Compile Application and Tests
      run: |
        mkdir -p bin
        # Compilar todas las clases de la aplicación y las pruebas
        javac -d bin -cp junit-platform-console-standalone.jar $(find src -name "*.java")

    - name: Run Tests
      run: |
        # Ejecutar los tests usando el Console Launcher de JUnit 5
        java -jar junit-platform-console-standalone.jar --class-path bin --scan-class-path --fail-if-no-tests
